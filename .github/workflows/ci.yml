name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    env:
      PUPPETEER_SKIP_DOWNLOAD: 'true'
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 26

      - run: pnpm install --frozen-lockfile

      - run: pnpm typecheck

      - run: pnpm test

      - run: pnpm lint
        working-directory: apps/frontend

      - run: pnpm lint
        working-directory: apps/backend

  e2e:
    runs-on: ubuntu-latest
    env:
      PUPPETEER_SKIP_DOWNLOAD: 'true'
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 26

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter @mms/shared build && pnpm --filter mms-backend build

      - name: Start backend
        env:
          JWT_SECRET: ci-test-secret
          DATABASE_URL: sqlite://mms.db
          NODE_ENV: test
          PLATFORM_ALLOW_ENV_BOOTSTRAP: 'true'
          PLATFORM_ADMIN_EMAIL: platform@test.com
          PLATFORM_ADMIN_PASSWORD: password123
        run: |
          cd apps/backend
          node dist/index.js &
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:3000/health >/dev/null; then
              echo "Backend ready"
              break
            fi
            sleep 1
          done
          curl -fsS http://127.0.0.1:3000/health >/dev/null || exit 1

      - name: Install Playwright browser
        run: pnpm exec playwright install chromium --with-deps

      - name: Start frontend
        run: |
          cd apps/frontend
          pnpm exec vite --host 127.0.0.1 --port 5173 &
          for i in $(seq 1 45); do
            if curl -fsS http://127.0.0.1:5173/health >/dev/null; then
              echo "Frontend ready"
              exit 0
            fi
            sleep 1
          done
          echo "Frontend failed to start"
          exit 1

      - run: pnpm exec playwright test --project=api --project=ui
        env:
          E2E_API_URL: http://127.0.0.1:3000
          E2E_BASE_URL: http://127.0.0.1:5173
          E2E_PLATFORM_EMAIL: platform@test.com
          E2E_PLATFORM_PASSWORD: password123
