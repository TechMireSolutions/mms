name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    env:
      PUPPETEER_SKIP_DOWNLOAD: 'true'
      JWT_SECRET: 'e2e-test-jwt-secret-key-at-least-32-chars-long'
      DATABASE_URL: 'postgres://postgres:postgres@localhost:5432/mms'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Start PostgreSQL and Setup Database
        run: |
          sudo systemctl start postgresql.service
          pg_isready
          sudo -u postgres psql -c "ALTER USER postgres PASSWORD 'postgres';"
          sudo -u postgres psql -c "CREATE DATABASE mms;"

      - name: Run Typecheck
        run: pnpm typecheck

      - name: Cache Playwright Browsers
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('e2e/package.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright Browsers
        run: pnpm --filter e2e-tests exec playwright install chromium

      - name: Run Test Suite
        run: pnpm test

      - name: Lint Frontend
        run: pnpm lint
        working-directory: apps/frontend

      - name: Lint Backend
        run: pnpm lint
        working-directory: apps/backend
