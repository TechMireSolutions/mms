name: Deploy MMSv2 to Hetzner

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      PUPPETEER_SKIP_DOWNLOAD: 'true'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 26

      - name: Install and build on runner
        run: |
          pnpm install --frozen-lockfile
          pnpm run build
          tar czf mms-dist.tar.gz apps/backend/dist apps/frontend/dist packages/shared/dist

      # Platform secrets (Settings → Secrets → Actions):
      #   PLATFORM_RESEND_API_KEY + PLATFORM_EMAIL_FROM + PLATFORM_APP_URL
      #   OR PLATFORM_SMTP_* + PLATFORM_EMAIL_FROM
      #   Optional bootstrap: PLATFORM_ALLOW_ENV_BOOTSTRAP=true, PLATFORM_ADMIN_EMAIL, PLATFORM_ADMIN_PASSWORD
      #   Optional verify fallback: MMS_API_URL=https://your-api-host (public /health)
      - name: Copy build tarball to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          source: mms-dist.tar.gz
          target: /tmp

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          PLATFORM_RESEND_API_KEY: ${{ secrets.PLATFORM_RESEND_API_KEY }}
          PLATFORM_SMTP_HOST: ${{ secrets.PLATFORM_SMTP_HOST }}
          PLATFORM_SMTP_PORT: ${{ secrets.PLATFORM_SMTP_PORT }}
          PLATFORM_SMTP_SECURE: ${{ secrets.PLATFORM_SMTP_SECURE }}
          PLATFORM_SMTP_USER: ${{ secrets.PLATFORM_SMTP_USER }}
          PLATFORM_SMTP_PASS: ${{ secrets.PLATFORM_SMTP_PASS }}
          PLATFORM_EMAIL_FROM: ${{ secrets.PLATFORM_EMAIL_FROM }}
          PLATFORM_EMAIL_FROM_NAME: ${{ secrets.PLATFORM_EMAIL_FROM_NAME }}
          PLATFORM_APP_URL: ${{ secrets.PLATFORM_APP_URL }}
          PLATFORM_ALLOW_ENV_BOOTSTRAP: ${{ secrets.PLATFORM_ALLOW_ENV_BOOTSTRAP }}
          PLATFORM_ADMIN_EMAIL: ${{ secrets.PLATFORM_ADMIN_EMAIL }}
          PLATFORM_ADMIN_PASSWORD: ${{ secrets.PLATFORM_ADMIN_PASSWORD }}
          PLATFORM_ADMIN_NAME: ${{ secrets.PLATFORM_ADMIN_NAME }}
          MMS_APP_DOMAIN: ${{ secrets.MMS_APP_DOMAIN }}
          MMS_API_URL: ${{ secrets.MMS_API_URL }}
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          command_timeout: 20m
          envs: PLATFORM_RESEND_API_KEY,PLATFORM_SMTP_HOST,PLATFORM_SMTP_PORT,PLATFORM_SMTP_SECURE,PLATFORM_SMTP_USER,PLATFORM_SMTP_PASS,PLATFORM_EMAIL_FROM,PLATFORM_EMAIL_FROM_NAME,PLATFORM_APP_URL,PLATFORM_ALLOW_ENV_BOOTSTRAP,PLATFORM_ADMIN_EMAIL,PLATFORM_ADMIN_PASSWORD,PLATFORM_ADMIN_NAME,MMS_APP_DOMAIN,MMS_API_URL
          script: |
            set -e
            cd /var/www/mmsv2

            git reset --hard HEAD
            git pull origin main

            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            export PATH="$HOME/.local/share/pnpm:$PATH"
            export PUPPETEER_SKIP_DOWNLOAD=true

            if [ -f scripts/merge-backend-env.sh ]; then
              bash scripts/merge-backend-env.sh apps/backend/.env
            else
              echo "WARNING: scripts/merge-backend-env.sh missing — skip env merge"
            fi

            pnpm install --frozen-lockfile

            tar xzf /tmp/mms-dist.tar.gz -C /var/www/mmsv2
            rm -f /tmp/mms-dist.tar.gz

            pm2 restart mmsv2-frontend --update-env || pm2 restart mmsv2-frontend || echo "WARNING: mmsv2-frontend restart failed"
            pm2 restart mmsv2-backend --update-env || pm2 restart mmsv2-backend || true

            if [ -f scripts/deploy-recover-backend.sh ]; then
              bash scripts/deploy-recover-backend.sh apps/backend/.env || {
                echo "WARNING: backend recovery failed — check pm2 logs on the server"
                pm2 logs mmsv2-backend --lines 50 --nostream || true
              }
            fi

            if [ -f scripts/deploy-verify.sh ]; then
              bash scripts/deploy-verify.sh apps/backend/.env || true
            fi

            pm2 save 2>/dev/null || true
            echo "MMSv2 deploy finished"
