name: Deploy MMSv2 to Hetzner

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Platform secrets (Settings → Secrets → Actions):
      #   PLATFORM_RESEND_API_KEY + PLATFORM_EMAIL_FROM + PLATFORM_APP_URL
      #   OR PLATFORM_SMTP_* + PLATFORM_EMAIL_FROM
      #   Optional bootstrap: PLATFORM_ALLOW_ENV_BOOTSTRAP=true, PLATFORM_ADMIN_EMAIL, PLATFORM_ADMIN_PASSWORD
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          PLATFORM_RESEND_API_KEY: ${{ secrets.PLATFORM_RESEND_API_KEY }}
          PLATFORM_SMTP_HOST: ${{ secrets.PLATFORM_SMTP_HOST }}
          PLATFORM_SMTP_PORT: ${{ secrets.PLATFORM_SMTP_PORT }}
          PLATFORM_SMTP_SECURE: ${{ secrets.PLATFORM_SMTP_SECURE }}
          PLATFORM_SMTP_USER: ${{ secrets.PLATFORM_SMTP_USER }}
          PLATFORM_SMTP_PASS: ${{ secrets.PLATFORM_SMTP_PASS }}
          PLATFORM_EMAIL_FROM: ${{ secrets.PLATFORM_EMAIL_FROM }}
          PLATFORM_EMAIL_FROM_NAME: ${{ secrets.PLATFORM_EMAIL_FROM_NAME }}
          PLATFORM_APP_URL: ${{ secrets.PLATFORM_APP_URL }}
          PLATFORM_ALLOW_ENV_BOOTSTRAP: ${{ secrets.PLATFORM_ALLOW_ENV_BOOTSTRAP }}
          PLATFORM_ADMIN_EMAIL: ${{ secrets.PLATFORM_ADMIN_EMAIL }}
          PLATFORM_ADMIN_PASSWORD: ${{ secrets.PLATFORM_ADMIN_PASSWORD }}
          PLATFORM_ADMIN_NAME: ${{ secrets.PLATFORM_ADMIN_NAME }}
          MMS_APP_DOMAIN: ${{ secrets.MMS_APP_DOMAIN }}
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          envs: PLATFORM_RESEND_API_KEY,PLATFORM_SMTP_HOST,PLATFORM_SMTP_PORT,PLATFORM_SMTP_SECURE,PLATFORM_SMTP_USER,PLATFORM_SMTP_PASS,PLATFORM_EMAIL_FROM,PLATFORM_EMAIL_FROM_NAME,PLATFORM_APP_URL,PLATFORM_ALLOW_ENV_BOOTSTRAP,PLATFORM_ADMIN_EMAIL,PLATFORM_ADMIN_PASSWORD,PLATFORM_ADMIN_NAME,MMS_APP_DOMAIN
          script: |
            set -e
            cd /var/www/mmsv2

            git pull origin main

            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            export PATH="$HOME/.local/share/pnpm:$PATH"

            if [ -f scripts/merge-backend-env.sh ]; then
              bash scripts/merge-backend-env.sh apps/backend/.env
            else
              echo "WARNING: scripts/merge-backend-env.sh missing — skip env merge"
            fi

            pnpm install --frozen-lockfile
            pnpm run build

            pm2 restart mmsv2-frontend --update-env || pm2 restart mmsv2-frontend
            pm2 restart mmsv2-backend --update-env || pm2 restart mmsv2-backend

            echo "Waiting for backend..."
            for i in $(seq 1 45); do
              if curl -fsS http://127.0.0.1:3000/health >/dev/null; then
                echo "Backend health OK"
                if curl -fsS http://127.0.0.1:3000/ready >/dev/null; then
                  echo "Backend ready (database connected)"
                else
                  echo "WARNING: /ready failed — check DATABASE_URL and PostgreSQL on the server"
                fi
                SETUP_STATUS="$(curl -fsS http://127.0.0.1:3000/api/platform/auth/setup/status 2>/dev/null || echo '{}')"
                echo "Platform setup status: ${SETUP_STATUS}"
                if echo "${SETUP_STATUS}" | grep -q '"smtpConfigured":false'; then
                  echo "WARNING: Platform email not configured — add GitHub Actions secrets and redeploy"
                fi
                if echo "${SETUP_STATUS}" | grep -q '"needsSetup":true' && echo "${SETUP_STATUS}" | grep -q '"smtpConfigured":false'; then
                  echo "TIP: set PLATFORM_ALLOW_ENV_BOOTSTRAP + PLATFORM_ADMIN_* secrets to create the first super-user without email"
                fi
                exit 0
              fi
              sleep 2
            done
            echo "Backend health check failed — is mmsv2-backend running on port 3000?"
            pm2 logs mmsv2-backend --lines 30 --nostream || true
            exit 1
